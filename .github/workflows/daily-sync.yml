name: Daily Sync
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: timeout 20m bash scripts/sync-upstream.sh
      - run: timeout 5m bash scripts/validate-ruleset.sh
      - run: timeout 10m bash scripts/generate-config.sh
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f ruleset/ configs/ CHANGELOG.md
          git diff --cached --stat || true
          git commit -m "📦 每日同步 $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
